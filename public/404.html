<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>404 — Página no encontrada | La Tendencia USA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #0f1117;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 560px;
      width: 100%;
    }

    .code {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(7rem, 22vw, 11rem);
      font-weight: 800;
      line-height: 1;
      color: #38bdf8;
      text-shadow:
        0 0 20px rgba(56, 189, 248, 0.6),
        0 0 60px rgba(56, 189, 248, 0.3),
        0 0 100px rgba(56, 189, 248, 0.15);
      animation: float 3.5s ease-in-out infinite;
      letter-spacing: -0.04em;
      user-select: none;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.1rem, 4vw, 1.4rem);
      font-weight: 700;
      color: #f1f5f9;
      margin-top: 1.25rem;
      line-height: 1.4;
    }

    .description {
      font-size: 0.95rem;
      color: #94a3b8;
      margin-top: 0.875rem;
      line-height: 1.7;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      border-radius: 9999px;
      margin: 1.75rem auto;
    }

    .search-label {
      font-size: 0.8rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 0.6rem;
    }

    .search-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      flex: 1;
      background-color: #1e2330;
      border: 1px solid #2d3748;
      border-radius: 0.5rem;
      color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .search-input::placeholder {
      color: #475569;
    }

    .search-input:focus {
      border-color: #38bdf8;
    }

    .search-btn {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      color: #38bdf8;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.65rem 1.1rem;
      transition: background-color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .search-btn:hover {
      background-color: #243044;
      border-color: #38bdf8;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 0.25rem;
    }

    @media (min-width: 400px) {
      .actions {
        flex-direction: row;
        justify-content: center;
      }
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.7rem 1.5rem;
      border-radius: 0.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      background-color: #38bdf8;
      color: #0f1117;
    }

    .btn-primary:hover {
      background-color: #7dd3fc;
      box-shadow: 0 4px 20px rgba(56, 189, 248, 0.35);
    }

    .btn-secondary {
      background-color: transparent;
      color: #cbd5e1;
      border: 1px solid #334155;
    }

    .btn-secondary:hover {
      border-color: #38bdf8;
      color: #38bdf8;
    }

    .brand {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #475569;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand a {
      color: #38bdf8;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .brand a:hover {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code" aria-hidden="true">404</div>

    <h1 class="title">Esta página no existe...<br>o se perdió en el metaverso 👾</h1>

    <p class="description">
      La URL que buscas no existe. Puede que haya sido movida,<br>
      eliminada o simplemente nunca existió.
    </p>

    <div class="divider"></div>

    <p class="search-label">¿Buscabas algo en particular?</p>
    <form class="search-form" id="search-form">
      <input
        type="text"
        class="search-input"
        id="search-input"
        placeholder="Busca un artículo..."
        autocomplete="off"
        autofocus
      />
      <button type="submit" class="search-btn">Buscar</button>
    </form>

    <div class="actions">
      <a href="https://latendenciausa.web.app/" class="btn btn-primary">
        Volver al inicio
      </a>
      <a href="https://latendenciausa.web.app/blog/" class="btn btn-secondary">
        Ver todos los artículos
      </a>
    </div>

    <p class="brand">
      <a href="https://latendenciausa.web.app/">La Tendencia USA</a>
    </p>
  </div>

  <script>
    document.getElementById('search-form').addEventListener('submit', function (e) {
      e.preventDefault();
      var q = document.getElementById('search-input').value.trim();
      if (q) {
        window.location.href = 'https://latendenciausa.web.app/buscar/?q=' + encodeURIComponent(q);
      }
    });
  </script>
</body>
</html>
