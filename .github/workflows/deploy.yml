name: Deploy to Firebase

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/blog/**'
      - 'src/**'
      - 'public/**'
      - 'astro.config.mjs'
      - 'firebase.json'
      - 'package.json'
  workflow_dispatch:

concurrency:
  group: firebase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Firebase
        run: |
          set +e
          OUTPUT=$(npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}" --project latendenciausa --non-interactive 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            if echo "$OUTPUT" | grep -q "is the current active version"; then
              echo "::notice::dist/ es idéntico al contenido ya publicado — nada que desplegar, no es un error."
              exit 0
            fi
            exit $EXIT_CODE
          fi
